<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#sky)"/>
  <!-- Terrain -->
  <path d="M0 24 Q4 20 8 22 Q12 18 16 20 Q20 17 24 19 Q28 21 32 18 V32 H0 Z" fill="#2d5a27"/>
  <!-- Tank body -->
  <rect x="9" y="18" width="10" height="4" rx="1" fill="#4a4a4a"/>
  <!-- Tank turret -->
  <rect x="12" y="16" width="5" height="3" rx="1" fill="#5a5a5a"/>
  <!-- Tank barrel -->
  <line x1="14.5" y1="16" x2="10" y2="12" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Treads -->
  <rect x="8" y="22" width="12" height="2" rx="1" fill="#3a3a3a"/>
  <!-- Muzzle flash / explosion -->
  <circle cx="9.5" cy="11.5" r="2.5" fill="#ff6b35" opacity="0.9"/>
  <circle cx="9.5" cy="11.5" r="1.5" fill="#ffd700" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="5" cy="5" r="0.7" fill="#fff" opacity="0.8"/>
  <circle cx="26" cy="4" r="0.5" fill="#fff" opacity="0.6"/>
  <circle cx="20" cy="8" r="0.6" fill="#fff" opacity="0.7"/>
  <circle cx="28" cy="12" r="0.4" fill="#fff" opacity="0.5"/>
</svg>
